<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vortext</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <h1>🎬 Vortext</h1>
        <p class="subtitle">Subtitle overlay for any video</p>

        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search movie or show..." autocomplete="off">
            <button id="searchBtn">Search</button>
        </div>

        <div id="results" class="results">
            <!-- Results will appear here -->
        </div>
    </div>

    <!-- 1. Load config first so the API_KEY variable is available -->
    <script src="config.js"></script>
    <!-- 2. Then load your main logic -->
    <script src="popup.js"></script>
</body>

</html>
